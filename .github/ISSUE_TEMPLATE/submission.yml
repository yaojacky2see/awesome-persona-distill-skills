name: 申请收录 / Submission Request
description: 申请将新的项目收录 / Request inclusion in the curated list
title: "[Submission]: "
labels:
  - submission
body:
  - type: markdown
    attributes:
      value: |
        请先阅读 [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)。 / Please read [CONTRIBUTING.en.md](../blob/main/CONTRIBUTING.en.md) first.

        请完整填写下列表单。维护者审核通过后，会通过 `approved` 标签自动生成 PR。

        Complete this form in full. Once a maintainer approves it, adding the `approved` label will generate a pull request automatically.
  - type: input
    id: repository
    attributes:
      label: 存储库链接 / Repository URL
      description: 请填写公开可访问的 GitHub 存储库链接。 / Provide a publicly accessible GitHub repository URL.
      placeholder: https://github.com/owner/repo
    validations:
      required: true
  - type: input
    id: project_name
    attributes:
      label: 项目名称 / Project Name
      description: 使用项目常用名称。 / Use the project's commonly used name.
    validations:
      required: true
  - type: textarea
    id: description_zh
    attributes:
      label: 汉语描述 / Chinese Description
      description: 一句话说明项目蒸馏的对象、来源或用途。 / One sentence describing what is distilled, from what source, or for what purpose.
      placeholder: 一句话，不要使用宣传性措辞。 / Keep it factual and non-promotional.
    validations:
      required: true
  - type: textarea
    id: description_en
    attributes:
      label: 英语描述 / English Description
      description: 一句话说明项目蒸馏的对象、来源或用途。 / One sentence describing what is distilled, from what source, or for what purpose.
      placeholder: 一句话，不要使用宣传性措辞。 / Keep it factual and non-promotional.
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 分类 / Category
      description: 请选择与当前 README 结构对应的固定分类。 / Choose the fixed category that matches the current README structure.
      options:
        - 自我蒸馏与元工具 / Self Distillation and Meta Tools
        - 职场与学术关系 / Workplace and Academic Relationships
        - 亲密关系与家庭记忆 / Intimate Relationships and Family Memories
        - 公众人物与方法论视角 / Public Figures and Methodological Perspectives
        - 精神性与专门化主题 / Spiritual and Specialized Topics
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: 收录理由 / Why It Belongs Here
      description: 说明它为什么适合本存储库。 / Explain why it fits this repository.
    validations:
      required: true
  - type: textarea
    id: differentiation
    attributes:
      label: 与现有条目的区别 / Differentiation
      description: 如有相近条目，请说明差异。 / If similar entries already exist, explain the difference.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 确认事项 / Confirmations
      options:
        - label: 我已阅读并遵循贡献指南 / I have read and follow the contribution guide
          required: true
